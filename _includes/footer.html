<footer class="text-center py-5">
    <div class="container">
        <span class="footer-logo">Gabriel Pham</span>
        <p class="mb-3 text-muted">© 2026 Gabriel Pham. All rights reserved.</p>
        
        <div class="system-status">
            <div>
                <span class="status-indicator">●</span> SYSTEM ONLINE
            </div>
            <div>
                <strong>TIMEZONES:</strong> <span id="global-clock">UTC: --:--:-- | EST: --:--:-- | PST: --:--:--</span>
            </div>
        </div>
    </div>
</footer>

<script>
    function updateClock() {
        const now = new Date();
        
        // Convert to different time zones
        const options = { timeZone: "UTC", hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" };
        const utcTime = now.toLocaleTimeString("en-US", options);
        
        const estOptions = { timeZone: "America/New_York", hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" };
        const estTime = now.toLocaleTimeString("en-US", estOptions);

        const pstOptions = { timeZone: "America/Los_Angeles", hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" };
        const pstTime = now.toLocaleTimeString("en-US", pstOptions);

        // Display the clock in the footer
        const clockEl = document.getElementById("global-clock");
        if (clockEl) {
            clockEl.innerHTML = `UTC: ${utcTime} | EST: ${estTime} | PST: ${pstTime}`;
        }
    }

    // Update clock every second
    setInterval(updateClock, 1000);
    updateClock();
</script>
